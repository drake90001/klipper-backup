# Driver0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0
#endstop_pin: ^PG6
position_endstop: 0
position_min: 0
position_max: 210
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: PG6
run_current: 0.650
interpolate: false
#stealthchop_threshold: 999999
stealthchop_threshold: 0
driver_SGTHRS: 100
#run_current: 0.580

# Driver1
[stepper_y]
#homing_retract_dist: 5.0
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: -15
position_min: -15
position_max: 240
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: PG9
driver_SGTHRS: 100
run_current: 0.700
interpolate: false
####sense_resistor: 0.110
#stealthchop_threshold: 999999
stealthchop_threshold: 0

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
Microsteps: 64
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -10
#position_endstop: 0.0
homing_speed: 15

[tmc2209 stepper_z]
uart_pin: PC6
diag_pin: PG10
run_current: 0.750
#interpolate: false
interpolate: false
###sense_resistor: 0.110
#stealthchop_threshold: 999999
#stealthchop_threshold: 0

# Driver3
# The Octopus only has 4 heater outputs which leaves an extra stepper
# This can be used for a second Z stepper, dual_carriage, extruder co-stepper,
# or other accesory such as an MMU
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
Microsteps: 64
rotation_distance: 8
#endstop_pin: PG11
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0

[tmc2209 stepper_z1]
uart_pin: PC7
diag_pin: PG11
run_current: 0.750
#interpolate: false
interpolate: false
###sense_resistor: 0.110
#stealthchop_threshold: 999999
#stealthchop_threshold: 0

[extruder]
max_extrude_only_distance: 250
