# Driver0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 128
rotation_distance: 40 #40
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0
#endstop_pin: ^PG6
position_endstop: 0
position_min: 0
position_max: 210
homing_speed: 75

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: ^PG6
run_current: 0.600
#interpolate: false
interpolate: false
#stealthchop_threshold: 999999
#stealthchop_threshold: 0
#driver_SGTHRS: 175
#run_current: 0.580

# Driver1
[stepper_y]
#homing_retract_dist: 5.0
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 128
rotation_distance: 40 #40
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: -20
position_min: -20
position_max: 235
homing_speed: 100

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: ^PG9
#driver_SGTHRS: 200
run_current: 0.700
#interpolate: false
interpolate: false
#stealthchop_threshold: 999999
#stealthchop_threshold: 0

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
Microsteps: 128 #16 T8 lead screw
rotation_distance: 8 #8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -10
#position_endstop: 0.0
homing_speed: 25

[tmc2209 stepper_z]
uart_pin: PC6 
diag_pin: ^PG10
run_current: 0.650
#interpolate: false
interpolate: false
#stealthchop_threshold: 999999
#stealthchop_threshold: 0

# Driver3
# The Octopus only has 4 heater outputs which leaves an extra stepper
# This can be used for a second Z stepper, dual_carriage, extruder co-stepper,
# or other accesory such as an MMU
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
Microsteps: 128
rotation_distance: 8
#endstop_pin: PG11
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0

[tmc2209 stepper_z1]
uart_pin: PC7
diag_pin: ^PG11
run_current: 0.650
#interpolate: false
interpolate: false
#stealthchop_threshold: 999999
#stealthchop_threshold: 0

[extruder]
max_extrude_only_distance: 250
step_pin: PE6
dir_pin: PA14
enable_pin: !PE0
Microsteps: 64
#gear_ratio: 44:10,37:17
rotation_distance: 5.7 ;5.56593778125 ; 5.300893125 ;5.3544375 #4.389 #3.99 #55 #26.35914 ;5.7
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0 # HE0
sensor_type: EPCOS 100K B57560G104F #EPCOS 100K B57560G104F
sensor_pin:  PF4 # T0
#control = pid
#pid_kp = 21.168
#pid_ki = 1.238
#pid_kd = 90.494
min_temp: 0
max_temp: 300 # Set to 300 for Sprite Pro Extruder
min_extrude_temp: 175
pressure_advance: 0.0
pressure_advance_smooth_time: 0.02
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: PD3
diag_pin: ^PG12
#uart_address: 3
run_current: 0.700
#interpolate: false
interpolate: false
#stealthchop_threshold: 999999
#stealthchop_threshold: 0